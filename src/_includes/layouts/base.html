<!doctype html>
<html lang="en">
  <head>
    {% if site.analyticsId %}
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id={{ site.analyticsId }}"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "{{ site.analyticsId }}");
    </script>
    {% endif %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} | {{ client.name }}</title>
    <meta
      name="description"
      content="{{ description or site.defaultDescription }}"
    />

    {% if noindex %}
    <meta name="robots" content="noindex" />
    {% endif %}

    <link rel="canonical" href="{{ client.domain }}{{ page.url }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ client.domain }}{{ page.url }}" />
    <meta property="og:title" content="{{ title }} | {{ client.name }}" />
    <meta
      property="og:description"
      content="{{ description or site.defaultDescription }}"
    />
    <meta
      property="og:image"
      content="{{ client.domain }}{{ ogImage or site.defaultOgImage }}"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="stylesheet" href="/css/shared.css" />

    {% block head %}{% endblock %}
  </head>
  <body>
    {% include "components/header.html" %}

    <main class="{{ mainClass }}">{% block body %}{% endblock %}</main>

    {% include "components/footer.html" %}

    <script defer src="/js/site.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
